apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: hello-k8s
data:
  nginx.conf: |
    events {}
    http {
      server {
        listen 80;

        location / {
          proxy_pass http://fastapi-service:80;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
        }

        location /health {
          return 200 "nginx ok\n";
          add_header Content-Type text/plain;
        }
      }
    }