name: Update FastAPI manifest

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-fastapi

jobs:
  update-manifests:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Update K8s Manifest with new image SHA
        run: |
          sed -i "s|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.workflow_run.head_sha }}|g" manifests/fastapi-deployment.yml

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "update-fastapi-manifest: fastapi-deployment.yml image >> ${{ github.event.workflow_run.head_sha }}"
          branch: refactor/fastapi-image-tag
          title: "update-fastapi-manifest: fastapi-deployment.yml image >> ${{ github.event.workflow_run.head_sha }}"
          body: "Automated image tag update"
          base: main